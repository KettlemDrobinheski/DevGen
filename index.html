<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DevGen</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Crie sua Landing Page com IA</h1>

    <p>
      Digite um prompt e veja a mágica acontecer
    </p>

    <div class="box-input">

      <textarea 
        id="prompt"
        placeholder="Ex: Crie uma página para cafeteria">
      </textarea>

      <button id="generateBtn">
        Gerar Página
      </button>

    </div>

    <div class="preview">

      <h2 id="titlePreview">
        Sua página aparecerá aqui
      </h2>

      <p id="textPreview">
        O conteúdo será gerado automaticamente
      </p>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
